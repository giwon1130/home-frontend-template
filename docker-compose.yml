services:
  giwon-home-api:
    build:
      context: ../giwon-home-api
    container_name: giwon-home-api
    restart: unless-stopped
    environment:
      PUBLIC_URL_HOME: ${PUBLIC_URL_HOME:-http://localhost:4173}
      PUBLIC_URL_ASSISTANT: ${PUBLIC_URL_ASSISTANT:-http://localhost:4173/assistant}
      PUBLIC_URL_HOME_HARMONY: ${PUBLIC_URL_HOME_HARMONY:-http://127.0.0.1:4174}
      PUBLIC_URL_ROUTE_OPS: ${PUBLIC_URL_ROUTE_OPS:-http://localhost:4173}
      PUBLIC_URL_SIGNAL_DESK: ${PUBLIC_URL_SIGNAL_DESK:-http://localhost:4180}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health | grep 'UP' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8081:8081"

  giwon-assistant-api:
    build:
      context: ../giwon-assistant-api
    container_name: giwon-assistant-api
    restart: unless-stopped
    environment:
      ASSISTANT_INTEGRATIONS_GEMINI_ENABLED: ${ASSISTANT_INTEGRATIONS_GEMINI_ENABLED:-false}
      ASSISTANT_GEMINI_MODEL: ${ASSISTANT_GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ASSISTANT_INTEGRATIONS_OPENAI_ENABLED: ${ASSISTANT_INTEGRATIONS_OPENAI_ENABLED:-false}
      ASSISTANT_OPENAI_MODEL: ${ASSISTANT_OPENAI_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep 'UP' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8080:8080"

  giwon-home:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
        VITE_ASSISTANT_API_BASE_URL: /assistant-api
    container_name: giwon-home
    restart: unless-stopped
    depends_on:
      giwon-home-api:
        condition: service_healthy
      giwon-assistant-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "4173:80"
